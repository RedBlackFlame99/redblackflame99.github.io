<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact – Hotdog Party</title>
<link rel="icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
<style>
body{margin:0;padding-top:90px;font-family:"Segoe UI",system-ui,sans-serif;background:#121212;color:white;overflow-x:hidden;}
.bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;overflow:hidden;}
.shape{position:absolute;width:60px;height:60px;background:linear-gradient(45deg,#ff7b00,#ffae00);opacity:.18;border-radius:14px;animation:float 18s linear infinite;}
@keyframes float{0%{transform:translateY(0) rotate(0)}50%{transform:translateY(-70px) rotate(180deg)}100%{transform:translateY(0) rotate(360deg)}}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;width:100%;background:rgba(18,18,18,.97);backdrop-filter:blur(12px);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 24px rgba(0,0,0,.7);box-sizing:border-box;z-index:1000;border-bottom:1px solid rgba(255,140,0,.12);}
.top-center{position:absolute;left:50%;transform:translateX(-50%);font-size:13px;font-weight:600;color:#555;pointer-events:none;letter-spacing:.5px;}
.top-left{display:flex;align-items:center;cursor:pointer;background:rgba(255,140,0,.07);border:1px solid rgba(255,140,0,.18);border-radius:12px;padding:6px 14px 6px 10px;transition:.2s;text-decoration:none;}
.top-left:hover{background:rgba(255,140,0,.14);border-color:rgba(255,140,0,.35);box-shadow:0 0 14px rgba(255,140,0,.15);}
.logo-emoji{font-size:26px;animation:bounce 2s infinite;line-height:1;margin-right:8px;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.header-text{font-family:'Luckiest Guy';font-size:22px;background:linear-gradient(45deg,#ff7b00,#ffcc00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px;}
.nav-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.nav-btn{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:10px;text-decoration:none;color:#ddd;font-weight:600;font-size:14px;transition:.2s;border:1px solid transparent;}
.nav-btn:hover{background:#1e1e1e;border-color:#333;color:white;}
.nav-btn svg{width:20px;height:20px;opacity:.85;}
.games-nav-btn{background:linear-gradient(45deg,rgba(255,140,0,.15),rgba(255,200,0,.1));border-color:rgba(255,140,0,.35)!important;color:#ffb347;font-weight:700;}
.games-nav-btn svg{opacity:1;color:#ff8c00;}
.games-nav-btn:hover{background:linear-gradient(45deg,rgba(255,140,0,.28),rgba(255,200,0,.18))!important;border-color:#ff8c00!important;color:#ffd000!important;box-shadow:0 0 14px rgba(255,140,0,.3);}
.discord-btn{display:flex;align-items:center;gap:8px;background:#5865F2;padding:8px 16px;border-radius:10px;color:white;text-decoration:none;font-weight:700;font-size:14px;border:1px solid rgba(255,255,255,.1);transition:.2s;box-shadow:0 2px 10px rgba(88,101,242,.35);}
.discord-btn svg{width:22px;height:22px;}
.discord-btn:hover{background:#ff8c00;box-shadow:0 0 16px rgba(255,140,0,.5);}

/* CONTACT */
.contact-wrap{max-width:560px;margin:60px auto 0;text-align:center;padding:0 20px 60px;}
.contact-wrap h2{font-family:'Luckiest Guy';font-size:48px;background:linear-gradient(45deg,#ff7b00,#ffcc00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:0 0 12px;}
.contact-wrap p{color:#888;font-size:16px;margin:0 0 48px;}
.contact-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:20px;padding:36px 40px;margin-bottom:20px;transition:.25s;text-align:left;}
.contact-card:hover{border-color:#ff8c00;box-shadow:0 0 22px rgba(255,140,0,.15);}
.contact-card-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:#666;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.contact-card-label svg{width:16px;height:16px;opacity:.6;}
.contact-email{font-size:22px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.copy-btn{background:rgba(255,140,0,.1);border:1px solid rgba(255,140,0,.3);color:#ff8c00;font-size:13px;font-weight:700;padding:7px 16px;border-radius:8px;cursor:pointer;transition:.2s;flex-shrink:0;}
.copy-btn:hover{background:rgba(255,140,0,.22);border-color:#ff8c00;}
.copy-btn.copied{background:rgba(0,200,100,.12);border-color:rgba(0,200,100,.4);color:#00c864;}
.recommend-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;background:linear-gradient(45deg,#ff8c00,#ffd000);color:#111;font-weight:900;font-size:17px;border:none;border-radius:14px;cursor:pointer;text-decoration:none;transition:.2s;box-shadow:0 4px 20px rgba(255,140,0,.35);margin-top:8px;}
.recommend-btn:hover{transform:scale(1.03);box-shadow:0 6px 28px rgba(255,140,0,.55);}
</style>
</head>
<body>

<div class="bg" id="bg"></div>

<div class="topbar">
  <div class="top-center">Credits: Carter M and Caden J</div>
  <a class="top-left" href="index.html">
    <div class="logo-emoji">🌭</div>
    <div class="header-text">Hotdog Party</div>
  </a>
  <div class="nav-right">
    <a class="nav-btn games-nav-btn" href="games.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="12" rx="4"/><path d="M8 11v4M6 13h4"/><circle cx="16" cy="12" r="1" fill="currentColor"/><circle cx="18" cy="14" r="1" fill="currentColor"/></svg>
      Games
    </a>
    <a class="nav-btn" href="contact.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      Contact
    </a>
    <a href="https://discord.gg/3y28DJYaVY" target="_blank" class="discord-btn">
      <svg viewBox="0 0 127.14 96.36"><path fill="white" d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,33.64-1.71,58.52.54,83.06a105.73,105.73,0,0,0,32.17,16.3,77.7,77.7,0,0,0,6.89-11.14,68.42,68.42,0,0,1-10.85-5.18c.91-.67,1.8-1.36,2.66-2.07a75.48,75.48,0,0,0,64.32,0c.87.71,1.76,1.4,2.66,2.07a68.68,68.68,0,0,1-10.87,5.19,77.23,77.23,0,0,0,6.9,11.13A105.25,105.25,0,0,0,126.6,83C129.2,54.59,122.2,30,107.7,8.07Z"/></svg>
      Discord
    </a>
  </div>
</div>

<div class="contact-wrap">
  <h2>📬 Contact Us</h2>
  <p>Got questions, issues, or just want to say hey? Reach out below.</p>
  <div class="contact-card">
    <div class="contact-card-label">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      Email us
    </div>
    <div class="contact-email">
      <span>hotdogparty854@gmail.com</span>
      <button class="copy-btn" id="copyBtn" onclick="copyEmail()">Copy</button>
    </div>
  </div>
  <div class="contact-card">
    <div class="contact-card-label">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      Suggest a game
    </div>
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSfYiXKpJ7o2cjKgrCvz6uNZ_lulE3e90rBCsKrtCXt4oQ1qoA/viewform?usp=publish-editor" target="_blank" class="recommend-btn">
      🎮 Recommendations
    </a>
  </div>
</div>

<script>
function copyEmail() {
  navigator.clipboard.writeText("hotdogparty854@gmail.com")
  const btn = document.getElementById("copyBtn")
  btn.textContent = "Copied!"
  btn.classList.add("copied")
  setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied") }, 2000)
}

const bg = document.getElementById("bg")
for (let i = 0; i < 30; i++) {
  const s = document.createElement("div")
  s.className = "shape"
  s.style.left = Math.random() * 100 + "%"
  s.style.top  = Math.random() * 100 + "%"
  s.style.animationDuration = (Math.random() * 20 + 10) + "s"
  bg.appendChild(s)
}
</script>
</body>
</html>
