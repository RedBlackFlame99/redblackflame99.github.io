<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Game Site</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:system-ui;
padding:40px;
}

h1{
margin-bottom:25px;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
}

.game{
background:#111;
border-radius:12px;
padding:15px;
cursor:pointer;
transition:.2s;
}

.game:hover{
transform:scale(1.05);
background:#181818;
}

.game img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

.game h3{
margin:0;
}

</style>

</head>

<body>

<h1>Games</h1>

<div class="games" id="games"></div>

<script>

async function loadGames(){

const response = await fetch("games.json")
const games = await response.json()

const container = document.getElementById("games")

games.forEach(game => {

const card = document.createElement("div")
card.className = "game"

card.innerHTML = `
<img src="${game.icon}">
<h3>${game.name}</h3>
`

card.onclick = () => {
window.location.href = game.path
}

container.appendChild(card)

})

}

loadGames()

</script>

</body>
</html>
