<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arcade Nexus</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

header{
    padding:20px;
    font-size:40px;
    font-weight:bold;
}

#menu{
    margin-top:20px;
}

button{
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:8px;
    background:#00c6ff;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

#gameContainer{
    display:none;
    margin-top:20px;
}

canvas{
    background:black;
    border:3px solid white;
}

#leaderboard{
    margin-top:20px;
}
</style>
</head>

<body>

<header>🎮 Arcade Nexus</header>

<div id="menu">
    <button onclick="startSnake()">Snake</button>
    <button onclick="startReaction()">Reaction Test</button>
</div>

<div id="gameContainer">
    <canvas id="game" width="600" height="400"></canvas>
    <div id="score"></div>
    <button onclick="backMenu()">Back</button>
</div>

<div id="leaderboard">
<h2>🏆 Leaderboard</h2>
<ul id="scores"></ul>
</div>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let currentGame = null
let score = 0

function showScores(){
    let scores = JSON.parse(localStorage.getItem("scores") || "[]")
    let list = document.getElementById("scores")
    list.innerHTML = ""

    scores.slice(0,10).forEach(s=>{
        let li=document.createElement("li")
        li.textContent=s
        list.appendChild(li)
    })
}

function saveScore(s){
    let scores = JSON.parse(localStorage.getItem("scores") || "[]")
    scores.push(s)
    scores.sort((a,b)=>b-a)
    localStorage.setItem("scores",JSON.stringify(scores))
    showScores()
}

showScores()

function backMenu(){
    document.getElementById("gameContainer").style.display="none"
    document.getElementById("menu").style.display="block"
    currentGame=null
}

function startSnake(){

document.getElementById("menu").style.display="none"
document.getElementById("gameContainer").style.display="block"

currentGame="snake"
score=0

let snake=[[10,10]]
let food=[15,10]
let dir=[1,0]

document.onkeydown=(e)=>{
if(e.key==="ArrowUp") dir=[0,-1]
if(e.key==="ArrowDown") dir=[0,1]
if(e.key==="ArrowLeft") dir=[-1,0]
if(e.key==="ArrowRight") dir=[1,0]
}

function loop(){

if(currentGame!=="snake") return

ctx.clearRect(0,0,600,400)

let head=[snake[0][0]+dir[0],snake[0][1]+dir[1]]

if(head[0]<0||head[1]<0||head[0]>=30||head[1]>=20){
saveScore(score)
alert("Game Over! Score: "+score)
backMenu()
return
}

snake.unshift(head)

if(head[0]==food[0]&&head[1]==food[1]){
score++
food=[Math.floor(Math.random()*30),Math.floor(Math.random()*20)]
}else{
snake.pop()
}

ctx.fillStyle="lime"
snake.forEach(s=>{
ctx.fillRect(s[0]*20,s[1]*20,18,18)
})

ctx.fillStyle="red"
ctx.fillRect(food[0]*20,food[1]*20,18,18)

document.getElementById("score").textContent="Score: "+score

setTimeout(loop,100)
}

loop()
}

function startReaction(){

document.getElementById("menu").style.display="none"
document.getElementById("gameContainer").style.display="block"

currentGame="reaction"
score=0

ctx.fillStyle="black"
ctx.fillRect(0,0,600,400)

let startTime

setTimeout(()=>{
ctx.fillStyle="green"
ctx.fillRect(0,0,600,400)
startTime=performance.now()
},Math.random()*3000+1000)

canvas.onclick=()=>{
if(currentGame!=="reaction") return

let reaction=Math.floor(performance.now()-startTime)
score=1000-reaction
saveScore(score)

alert("Reaction time: "+reaction+"ms")
backMenu()
}

}

</script>

</body>
</html>
