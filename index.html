<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arcyn</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:system-ui;
}

body{
background:#0b0b0b;
color:white;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
}

header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:30px;
font-size:20px;
font-weight:600;
}

.logo{
width:34px;
height:34px;
border-radius:8px;
background:#16a34a;
display:flex;
align-items:center;
justify-content:center;
}

.hero{
background:linear-gradient(135deg,#0f3d22,#08120d);
border-radius:18px;
padding:40px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.hero h1{
font-size:40px;
}

.hero p{
color:#9ca3af;
margin-top:10px;
}

.gameIcon{
width:100px;
height:100px;
background:#14532d;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:25px;
}

.stat{
background:#121212;
padding:18px;
border-radius:12px;
}

.stat h2{
font-size:20px;
}

.stat span{
color:#9ca3af;
font-size:13px;
}

.search{
margin-bottom:20px;
}

.search input{
width:100%;
padding:14px;
border-radius:10px;
border:none;
background:#141414;
color:white;
}

.categories{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:25px;
}

.category{
background:#141414;
padding:8px 16px;
border-radius:20px;
font-size:14px;
cursor:pointer;
}

.category.active{
background:#16a34a;
}

.sectionTitle{
margin-bottom:15px;
font-size:20px;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:15px;
}

.game{
background:#111;
border-radius:14px;
height:120px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
color:#888;
transition:.2s;
}

.game:hover{
transform:scale(1.05);
background:#181818;
}

</style>
</head>

<body>

<div class="container">

<header>
<div class="logo">🎮</div>
Arcyn
</header>

<div class="hero">
<div>
<span style="color:#22c55e">Play Free Games</span>
<h1>Welcome to <span style="color:#22c55e">Arcyn</span></h1>
<p>Discover and play amazing HTML games right in your browser. No downloads needed.</p>
</div>

<div class="gameIcon">
🎮
</div>
</div>

<div class="stats">

<div class="stat">
<h2>14</h2>
<span>Total Games</span>
</div>

<div class="stat">
<h2>8,200</h2>
<span>Total Plays</span>
</div>

<div class="stat">
<h2>5</h2>
<span>Categories</span>
</div>

<div class="stat">
<h2>7</h2>
<span>Featured</span>
</div>

</div>

<div class="search">
<input placeholder="Search games...">
</div>

<div class="categories">
<div class="category active">All Games</div>
<div class="category">Arcade</div>
<div class="category">Puzzle</div>
<div class="category">Strategy</div>
<div class="category">Action</div>
<div class="category">Adventure</div>
<div class="category">Sports</div>
<div class="category">Card</div>
<div class="category">Racing</div>
</div>

<div class="sectionTitle">Featured</div>

<div class="games">

<div class="game">🚗</div>
<div class="game">🧠</div>
<div class="game">🕹</div>
<div class="game">⚔️</div>
<div class="game">🏀</div>
<div class="game">🎯</div>

</div>

</div>

</body>
</html>
