<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Game Site</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:system-ui;
padding:40px;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
}

.game{
position:relative;
aspect-ratio:1/1;
overflow:hidden;
border-radius:12px;
cursor:pointer;
}

.game img{
width:100%;
height:100%;
object-fit:cover;
transition:0.25s;
}

.game::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top, rgba(0,0,0,0.85), transparent);
opacity:0;
transition:0.25s;
z-index:1;
}

.game .title{
position:absolute;
bottom:0;
left:0;
right:0;
padding:14px;
text-align:center;
font-weight:600;
opacity:0;
transform:translateY(10px);
transition:0.25s;
color:white;
z-index:2; /* ensures text is above overlay */
}

.game:hover img{
transform:scale(1.1);
}

.game:hover::after{
opacity:1;
}

.game:hover .title{
opacity:1;
transform:translateY(0);
}

</style>

</head>

<body>
    
<div class="games" id="games"></div>

<script>

async function loadGames(){

const response = await fetch("games.json")
const games = await response.json()

const container = document.getElementById("games")

games.forEach(game => {

const card = document.createElement("div")
card.className = "game"

card.innerHTML = `
<img src="${game.icon}">
<div class="title">${game.name}</div>
`

card.onclick = () => {
window.location.href = game.path
}

container.appendChild(card)

})

}

loadGames()

</script>

</body>
</html>
