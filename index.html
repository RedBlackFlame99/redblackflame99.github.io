<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hotdog Party</title>

<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:110px 40px 40px;
background:#0f0f0f;
font-family:Segoe UI,system-ui;
color:white;
overflow-x:hidden;
cursor:url("https://cdn-icons-png.flaticon.com/512/1046/1046784.png") 16 16, auto;
}

/* TOPBAR */

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
background:rgba(20,20,20,.9);
backdrop-filter:blur(8px);
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
box-shadow:0 5px 20px rgba(0,0,0,.6);
z-index:1000;
box-sizing:border-box;
}

.top-left{
display:flex;
align-items:center;
gap:12px;
}

.logo{
font-size:32px;
}

.title{
font-family:'Luckiest Guy',cursive;
font-size:34px;
background:linear-gradient(45deg,#ff8c00,#ffb347);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.top-right{
display:flex;
gap:14px;
align-items:center;
}

/* BUTTONS */

.btn{
padding:8px 16px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:600;
position:relative;
overflow:hidden;
transition:.3s;
}


.extras-btn{
background:#ff8c00;
color:white;
}

.extras-btn:hover{
box-shadow:0 0 10px #ff8c00,0 0 20px #ff8c00,0 0 35px #ff8c00;
transform:translateY(-2px);
}

/* DISCORD BUTTON */

.discord-btn{
display:flex;
align-items:center;
gap:8px;
background:#5865F2;
color:white;
text-decoration:none;
padding:8px 16px;
border-radius:10px;
font-weight:600;
transition:.3s;
}

.discord-btn svg{
width:20px;
height:20px;
}

.discord-btn:hover{
box-shadow:0 0 15px #5865F2,0 0 30px #5865F2;
transform:translateY(-2px);
}

/* SEARCH */

.search{
display:flex;
justify-content:center;
margin-bottom:30px;
}

.search input{
width:420px;
padding:12px 18px;
border-radius:50px;
border:none;
background:#1e1e1e;
color:white;
}

/* STATS */

.stats{
text-align:center;
margin-bottom:25px;
opacity:.8;
}

/* RECOMMENDED */

.recommended{
margin-bottom:35px;
overflow:hidden;
}

.slider{
display:flex;
gap:20px;
animation:slide 20s linear infinite;
}

.rec{
min-width:200px;
background:#1a1a1a;
border-radius:12px;
padding:15px;
text-align:center;
}

@keyframes slide{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

/* GAMES GRID */

.games{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:25px;
}

.game{
aspect-ratio:1/1;
background:#1a1a1a;
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:.3s;
position:relative;
}

.game img{
width:100%;
height:100%;
object-fit:cover;
}

.game:hover{
transform:translateY(-6px);
box-shadow:0 15px 25px rgba(0,0,0,.6);
}

.game .title{
position:absolute;
bottom:0;
width:100%;
padding:10px;
background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
text-align:center;
font-weight:600;
}

/* BACKGROUND */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
}

.shape{
position:absolute;
background:#ff8c00;
opacity:.25;
animation:float linear infinite;
}

@keyframes float{
0%{transform:translateY(0) rotate(0)}
50%{transform:translateY(-60px) rotate(180deg)}
100%{transform:translateY(0) rotate(360deg)}
}

/* FLOATING HOTDOGS */

.hotdog{
position:fixed;
font-size:26px;
animation:hotdogFloat linear infinite;
}

@keyframes hotdogFloat{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

/* EXTRAS */

.extras-content{
max-width:700px;
margin:auto;
text-align:center;
padding:40px;
}

.card{
background:#1a1a1a;
padding:20px;
border-radius:14px;
margin:20px 0;
}

</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="topbar">

<div class="top-left">
<div class="logo">🌭</div>
<div class="title">Hotdog Party</div>
</div>

<div class="top-right" id="navButtons">

<button class="btn extras-btn" onclick="openExtras()">🔥 Extras</button>

<a href="https://discord.gg/3y28DJYaVY" target="_blank" class="discord-btn">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 127.14 96.36">
<path fill="white" d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.09 0A72.37 72.37 0 0 0 45.65 0a105.89 105.89 0 0 0-26.24 8.07C2.79 32.65-2.21 56.6.27 80.21a105.73 105.73 0 0 0 32.17 16.15 77.7 77.7 0 0 0 6.89-11.11 68.42 68.42 0 0 1-10.85-5.18c.91-.67 1.8-1.38 2.66-2.11a75.57 75.57 0 0 0 64 0c.87.73 1.76 1.44 2.66 2.11a68.68 68.68 0 0 1-10.87 5.19 77.53 77.53 0 0 0 6.89 11.1A105.25 105.25 0 0 0 126.87 80.2c3.13-27.97-5.34-51.48-19.17-72.13Z"/>
</svg>

Discord

</a>

</div>
</div>

<div id="home">

<div class="stats">
<span id="players"></span> players online • <span id="gamesPlayed"></span> games played today
</div>

<div class="search">
<input type="text" id="search" placeholder="Search games...">
</div>

<div class="recommended">
<div class="slider" id="slider"></div>
</div>

<div class="games" id="games"></div>

</div>

<div id="extras" style="display:none">

<div class="extras-content">

<h1>🔥 Extras</h1>

<div class="card">
<h2>Email</h2>
<p>hotdogparty854@gmail.com</p>
</div>

<div class="card">
<h2>Recommend a Game</h2>

<a href="https://docs.google.com/forms/d/e/1FAIpQLSfYiXKpJ7o2cjKgrCvz6uNZ_lulE3e90rBCsKrtCXt4oQ1qoA/viewform"
target="_blank"
class="btn extras-btn">Submit</a>

</div>

<div class="card">
<h2>Credits</h2>
<p>Carter M</p>
<p>Caden J</p>
</div>

</div>
</div>

<script>

/* shapes */

const bg=document.getElementById("bg");

for(let i=0;i<30;i++){
let s=document.createElement("div");
s.className="shape";
let size=Math.random()*60+20;
s.style.width=size+"px";
s.style.height=size+"px";
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
s.style.borderRadius=Math.random()>.5?"50%":"10px";
s.style.animationDuration=(Math.random()*20+10)+"s";
bg.appendChild(s);
}

/* hotdogs */

for(let i=0;i<10;i++){
let h=document.createElement("div");
h.className="hotdog";
h.innerHTML="🌭";
h.style.left=Math.random()*100+"%";
h.style.bottom="-50px";
h.style.animationDuration=(Math.random()*20+10)+"s";
document.body.appendChild(h);
}

/* fake stats */

players.innerText=Math.floor(Math.random()*900+100);
gamesPlayed.innerText=Math.floor(Math.random()*5000+1000);

/* games */

let games=[];

async function loadGames(){

const res=await fetch("games.json");
games=await res.json();

renderGames(games);
renderRecommended(games);

}

function renderGames(list){

games.innerHTML="";

list.forEach(g=>{

let div=document.createElement("div");
div.className="game";

div.innerHTML=`
<img src="${g.icon}">
<div class="title">${g.name}</div>
`;

div.onclick=()=>window.open(g.url,"_blank");

games.appendChild(div);

});

}

function renderRecommended(list){

slider.innerHTML="";

let items=list.slice(0,6);

items.concat(items).forEach(g=>{
let div=document.createElement("div");
div.className="rec";
div.innerText=g.name;
});

}

search.addEventListener("input",e=>{
let q=e.target.value.toLowerCase();
renderGames(games.filter(g=>g.name.toLowerCase().includes(q)));
});

loadGames();

/* PAGE SWITCH */

function openExtras(){

home.style.display="none";
extras.style.display="block";

navButtons.innerHTML=`
<button class="btn extras-btn" onclick="goHome()">🎮 Games</button>

<a href="https://discord.gg/3y28DJYaVY" target="_blank" class="discord-btn">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 127.14 96.36">
<path fill="white" d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.09 0A72.37 72.37 0 0 0 45.65 0a105.89 105.89 0 0 0-26.24 8.07C2.79 32.65-2.21 56.6.27 80.21a105.73 105.73 0 0 0 32.17 16.15 77.7 77.7 0 0 0 6.89-11.11 68.42 68.42 0 0 1-10.85-5.18c.91-.67 1.8-1.38 2.66-2.11a75.57 75.57 0 0 0 64 0c.87.73 1.76 1.44 2.66 2.11a68.68 68.68 0 0 1-10.87 5.19 77.53 77.53 0 0 0 6.89 11.1A105.25 105.25 0 0 0 126.87 80.2c3.13-27.97-5.34-51.48-19.17-72.13Z"/>
</svg>

Discord
</a>
`;

}

function goHome(){

extras.style.display="none";
home.style.display="block";

navButtons.innerHTML=`
<button class="btn extras-btn" onclick="openExtras()">🔥 Extras</button>

<a href="https://discord.gg/3y28DJYaVY" target="_blank" class="discord-btn">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 127.14 96.36">
<path fill="white" d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.09 0A72.37 72.37 0 0 0 45.65 0a105.89 105.89 0 0 0-26.24 8.07C2.79 32.65-2.21 56.6.27 80.21a105.73 105.73 0 0 0 32.17 16.15 77.7 77.7 0 0 0 6.89-11.11 68.42 68.42 0 0 1-10.85-5.18c.91-.67 1.8-1.38 2.66-2.11a75.57 75.57 0 0 0 64 0c.87.73 1.76 1.44 2.66 2.11a68.68 68.68 0 0 1-10.87 5.19 77.53 77.53 0 0 0 6.89 11.1A105.25 105.25 0 0 0 126.87 80.2c3.13-27.97-5.34-51.48-19.17-72.13Z"/>
</svg>

Discord
</a>
`;

}

</script>

</body>
</html>
