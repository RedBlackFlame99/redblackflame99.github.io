<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hotdog Party</title>

<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

<style>

/* ---------- BODY ---------- */

body{
margin:0;
padding:120px 30px 40px;
font-family:"Segoe UI",system-ui,sans-serif;
background:#121212;
color:white;
overflow-x:hidden;
}

/* ---------- FLOATING BLOCKS ---------- */

.background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
}

.block{
position:absolute;
background:linear-gradient(45deg,#ff7b00,#ffae00);
opacity:.25;
animation:float linear infinite;
}

@keyframes float{
0%{transform:translateY(0) rotate(0deg)}
50%{transform:translateY(-80px) rotate(180deg)}
100%{transform:translateY(0) rotate(360deg)}
}

/* ---------- HEADER ---------- */

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
height:90px;
background:rgba(24,24,24,0.65);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
box-sizing:border-box;
box-shadow:0 6px 20px rgba(0,0,0,.6);
z-index:1000;
}

/* ---------- LOGO ---------- */

.top-left{
display:flex;
align-items:center;
gap:12px;
}

.logo{
font-size:2.8rem;
animation:bounce 2s infinite;
}

.title{
font-family:'Luckiest Guy',cursive;
font-size:2.6rem;
background:linear-gradient(45deg,#ff7b00,#ffae00);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-6px)}
}

/* ---------- HEADER BUTTONS ---------- */

.top-buttons{
display:flex;
gap:12px;
align-items:center;
}

/* ---------- DISCORD BUTTON ---------- */

.discord-btn{
display:flex;
align-items:center;
gap:8px;
padding:10px 16px;
border-radius:12px;
background:rgba(88,101,242,.2);
border:1px solid rgba(255,255,255,.15);
backdrop-filter:blur(8px);
color:white;
text-decoration:none;
font-weight:bold;
transition:.25s;
}

.discord-btn svg{
width:22px;
height:22px;
fill:white;
}

.discord-btn:hover{
background:rgba(88,101,242,.35);
box-shadow:
0 0 12px #5865F2,
0 0 25px rgba(88,101,242,.6);
transform:translateY(-2px);
}

/* ---------- EXTRA BUTTON ---------- */

.extra-btn{
padding:10px 16px;
border-radius:12px;
border:none;
background:rgba(255,140,0,.25);
backdrop-filter:blur(8px);
border:1px solid rgba(255,255,255,.15);
color:white;
font-weight:bold;
cursor:pointer;
position:relative;
overflow:hidden;
}

.extra-btn::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,.4),transparent);
transition:.5s;
}

.extra-btn:hover::before{
left:100%;
}

.extra-btn:hover{
box-shadow:
0 0 15px #ff8c00,
0 0 30px rgba(255,140,0,.6);
transform:translateY(-2px);
}

/* ---------- SEARCH ---------- */

.search-container{
display:flex;
justify-content:center;
margin-bottom:40px;
}

.search-box{
background:rgba(30,30,30,.7);
backdrop-filter:blur(8px);
border-radius:50px;
padding:12px 18px;
width:100%;
max-width:500px;
border:1px solid rgba(255,255,255,.08);
}

.search-box input{
width:100%;
border:none;
outline:none;
background:transparent;
color:white;
font-size:16px;
}

/* ---------- GAMES GRID ---------- */

.games{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:25px;
}

.game{
aspect-ratio:1/1;
background:#1f1f1f;
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:.25s;
position:relative;
}

.game img{
width:100%;
height:100%;
object-fit:cover;
}

.game:hover{
transform:translateY(-6px);
box-shadow:0 14px 25px rgba(0,0,0,.6);
}

.game-title{
position:absolute;
bottom:0;
left:0;
right:0;
background:rgba(0,0,0,.6);
padding:10px;
text-align:center;
}

/* ---------- EXTRAS ---------- */

.extras-view{
display:none;
}

.extras-content{
text-align:center;
margin-top:80px;
font-size:20px;
}

.email{
font-size:22px;
color:#ff8c00;
}

.recommend-btn{
display:inline-block;
padding:12px 22px;
background:rgba(255,140,0,.25);
border-radius:12px;
border:1px solid rgba(255,255,255,.15);
color:white;
text-decoration:none;
font-weight:bold;
margin-top:20px;
backdrop-filter:blur(8px);
transition:.25s;
}

.recommend-btn:hover{
box-shadow:
0 0 15px #ff8c00,
0 0 30px rgba(255,140,0,.6);
transform:translateY(-2px);
}

</style>
</head>

<body>

<div class="background" id="background"></div>

<!-- HEADER -->

<div class="topbar">

<div class="top-left">
<div class="logo">🌭</div>
<div class="title">Hotdog Party</div>
</div>

<div class="top-buttons">

<a class="discord-btn" href="https://discord.gg/3y28DJYaVY" target="_blank">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 127.14 96.36">
<path d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.11 0A72.37 72.37 0 0 0 45.64 0 105.89 105.89 0 0 0 19.39 8.09C2.79 32.65-1.1 56.6.84 80.21A105.73 105.73 0 0 0 32.71 96.36a77.7 77.7 0 0 0 6.7-10.92 68.42 68.42 0 0 1-10.55-5.04c.89-.67 1.76-1.36 2.6-2.08 20.32 9.28 42.39 9.28 62.47 0 .85.72 1.72 1.41 2.6 2.08a68.68 68.68 0 0 1-10.57 5.05 77.55 77.55 0 0 0 6.71 10.9 105.25 105.25 0 0 0 31.89-16.15C129.84 52.84 121.09 29.11 107.7 8.07Z"/>
</svg>

Discord
</a>

<button class="extra-btn" id="toggleButton" onclick="toggleExtras()">Extras</button>

</div>

</div>

<!-- SEARCH -->

<div class="search-container" id="searchSection">
<div class="search-box">
<input type="text" placeholder="Search games...">
</div>
</div>

<!-- GAMES -->

<div class="games" id="games"></div>

<!-- EXTRAS -->

<div class="extras-view" id="extrasView">

<div class="extras-content">

<h1>Extras</h1>

<h2>Email</h2>
<p>Email us at:</p>
<p class="email">hotdogparty854@gmail.com</p>

<a class="recommend-btn"
href="https://docs.google.com/forms/d/e/1FAIpQLSfYiXKpJ7o2cjKgrCvz6uNZ_lulE3e90rBCsKrtCXt4oQ1qoA/viewform"
target="_blank">
Send Recommendations
</a>

<h2>Credits</h2>
<p>Carter M</p>
<p>Caden J</p>

</div>

</div>

<script>
let allGames = [];

async function loadGames(){
  try{
    const response = await fetch("./games.json");
    const games = await response.json();
    allGames = games;
    renderGames(games);
  }catch(err){
    console.error("Failed to load games.json", err);
  }
}

function renderGames(games){
  const container = document.getElementById("games");
  container.innerHTML = "";

  games.forEach(game => {

    const card = document.createElement("div");
    card.className = "game";

    const img = document.createElement("img");
    img.src = game.icon;
    img.alt = game.name;

    const title = document.createElement("div");
    title.className = "title";
    title.textContent = game.name;

    card.appendChild(img);
    card.appendChild(title);

    card.addEventListener("click", () => {
      openGame(game.path);
    });

    container.appendChild(card);
  });
}

/* Search */
document.getElementById("search").addEventListener("input", e => {
  const query = e.target.value.toLowerCase().trim();

  const filtered = allGames.filter(game =>
    game.name.toLowerCase().includes(query)
  );

  renderGames(filtered);
});

loadGames();

/* Game overlay */
const gameView = document.getElementById("gameView");
const gameIframe = document.getElementById("gameIframe");

document.getElementById("backBtn").onclick = () => {
  gameView.style.display = "none";
  gameIframe.src = "";
};

document.getElementById("fullscreenBtn").onclick = () => {
  if(gameIframe.requestFullscreen) gameIframe.requestFullscreen();
  else if(gameIframe.webkitRequestFullscreen) gameIframe.webkitRequestFullscreen();
  else if(gameIframe.msRequestFullscreen) gameIframe.msRequestFullscreen();
};

function openGame(url){
  gameIframe.src = url;
  gameView.style.display = "flex";
}

/* Background shapes */
const bgShapes = document.getElementById("bgShapes");
const numShapes = 25;

for(let i=0;i<numShapes;i++){
  const shape = document.createElement("div");
  shape.className = "shape";

  const size = Math.random()*60+20;
  shape.style.width = size+"px";
  shape.style.height = size+"px";
  shape.style.left = Math.random()*100+"%";
  shape.style.top = Math.random()*100+"%";
  shape.style.animationDuration = (Math.random()*20+10)+"s";
  shape.style.animationDelay = (Math.random()*-20)+"s";
  shape.style.borderRadius = Math.random()>0.5 ? "50%" : "20%";
  shape.style.opacity = Math.random()*0.3+0.1;

  bgShapes.appendChild(shape);
}
</script>

</body>
</html>
