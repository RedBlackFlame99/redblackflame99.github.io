<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hotdog Party</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

<style>
/* Body */
body{
  margin:0;
  padding:120px 40px 40px 40px;
  font-family:"Segoe UI",system-ui,sans-serif;
  background:#121212;
  color:white;
  overflow-x:hidden;
}

/* Background shapes */
.background-shapes{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
  overflow:hidden;
}

.shape{
  position:absolute;
  border-radius:50%;
  opacity:0.3;
  background:linear-gradient(45deg,#ff7b00,#ffae00);
  animation:moveShape linear infinite;
}

@keyframes moveShape{
  0%{transform:translateY(0) translateX(0) rotate(0deg)}
  50%{transform:translateY(-50px) translateX(50px) rotate(180deg)}
  100%{transform:translateY(0) translateX(0) rotate(360deg)}
}

/* Top bar */
.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:rgba(24,24,24,0.9);
  backdrop-filter:blur(6px);
  padding:20px 20px;
  box-shadow:0 6px 20px rgba(0,0,0,.6);
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
  z-index:1000;
  box-sizing:border-box;
}

/* Logo */
.top-left{
  display:flex;
  align-items:center;
}

.logo-emoji{
  font-size:3rem;
  margin-right:12px;
  animation:bounce 2s infinite;
}

.header-text{
  font-family:'Luckiest Guy',cursive;
  font-size:3rem;
  background:linear-gradient(45deg,#ff7b00,#ffae00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

/* Credits text */
.credits{
  width:100%;
  text-align:center;
  font-size:12px;
  margin-top:5px;
  opacity:0.7;
}

/* Discord button */
.discord-btn{
  display:flex;
  align-items:center;
  gap:6px;
  background:#5865F2;
  padding:8px 14px;
  border-radius:12px;
  font-weight:bold;
  color:white;
  text-decoration:none;
  transition:.3s;
  flex-shrink:0;
  white-space:nowrap;
}

.discord-btn svg{
  width:20px;
  height:20px;
  vertical-align:middle;
}

.discord-btn:hover{
  background:#ff8c00;
  box-shadow:0 0 12px #ff8c00;
}

/* Search */
.search-container{
  margin:35px 0;
  display:flex;
  justify-content:center;
}

.search-box{
  display:flex;
  align-items:center;
  background:rgba(30,30,30,0.9);
  border-radius:50px;
  padding:12px 18px;
  width:100%;
  max-width:500px;
}

.search-box input{
  border:none;
  outline:none;
  background:transparent;
  color:white;
  font-size:16px;
  width:100%;
}

/* Games grid */
.games{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:25px;
}

.game{
  position:relative;
  aspect-ratio:1/1;
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  background:rgba(31,31,31,0.85);
  transition:.3s;
}

.game img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.game:hover{
  transform:translateY(-6px);
  box-shadow:0 14px 25px rgba(0,0,0,.6);
}

.game .title{
  position:absolute;
  bottom:0;
  width:100%;
  text-align:center;
  padding:10px;
  background:rgba(0,0,0,.7);
}
</style>
</head>

<body>

<div class="background-shapes" id="bgShapes"></div>

<div class="topbar">
  <div class="top-left">
    <div class="logo-emoji">🌭</div>
    <div class="header-text">Hotdog Party</div>
  </div>

  <a href="https://discord.gg/3y28DJYaVY" target="_blank" class="discord-btn">
    <svg viewBox="0 0 245 240" xmlns="http://www.w3.org/2000/svg">
      <path d="M104.4 104.2c-5.7 0-10.3 5-10.3 11.1s4.6 11 10.3 11c5.7 0 10.3-5 10.3-11s-4.6-11.1-10.3-11.1zm36.3 0c-5.7 0-10.3 5-10.3 11.1s4.6 11 10.3 11c5.7 0 10.3-5 10.3-11s-4.6-11.1-10.3-11.1z"/>
      <path d="M189.5 20h-134C38 20 20 38 20 59.5v121C20 202 38 220 55.5 220h121c17.5 0 35.5-18 35.5-39.5v-121C225 38 207 20 189.5 20zm-42.5 128.8s-3.9-4.7-7.1-8.9c14.2-4.1 19.6-13.2 19.6-13.2-4.4 2.9-8.6 5-12.4 6.4-5.4 2.3-10.5 3.9-15.6 4.8-10.1 1.8-19.2 1.4-27.5-.1-6.1-1.1-11.4-2.5-16-4.8-2.5-1.3-5.2-2.8-7.9-4.6 0 0 5.3 9 19.2 13.1-3.2 4.2-7.1 8.9-7.1 8.9-23.4-1.1-32.3-16.1-32.3-16.1 0-34.1 15.2-61.8 15.2-61.8 15.2-11.3 29.7-10.9 29.7-10.9l1.1 1.3c-19.1 5.5-27.9 13.8-27.9 13.8s2.3-1.3 6.2-3c11.2-4.9 20-6.4 23.6-6.8 0.6-.1 1.2-.1 1.8-.1 6.3-.4 13.1-.1 20.1 1.8 0 0 12.2 2.7 24.7 9.2 0 0-8.6-8.3-26-13.8l1.4-1.5s14.5-.4 29.7 10.9c0 0 15.2 27.7 15.2 61.8 0 .1-8.9 15-32.3 16.1z"/>
    </svg>
    Discord
  </a>
  <div class="credits">Creds: Carter M and Caden J</div>
</div>

<div class="search-container">
  <div class="search-box">
    <input type="text" id="search" placeholder="Search games...">
  </div>
</div>

<div class="games" id="games"></div>

<script>
let allGames=[];

async function loadGames(){
  const res=await fetch("games.json");
  const games=await res.json();
  allGames=games;
  renderGames(games);
}

function renderGames(games){
  const container=document.getElementById("games");
  container.innerHTML="";
  games.forEach(game=>{
    const card=document.createElement("div");
    card.className="game";
    card.innerHTML=`<img src="${game.icon}"><div class="title">${game.name}</div>`;
    card.onclick=()=>{window.location.href=game.path;}
    container.appendChild(card);
  });
}

document.getElementById("search").addEventListener("input",e=>{
  const query=e.target.value.toLowerCase();
  renderGames(allGames.filter(g=>g.name.toLowerCase().includes(query)));
});

loadGames();

/* Floating shapes */
const bgShapes = document.getElementById('bgShapes');
for(let i=0;i<25;i++){
  const shape=document.createElement('div');
  shape.className='shape';
  let size=Math.random()*60+20;
  shape.style.width=size+'px';
  shape.style.height=size+'px';
  shape.style.left=Math.random()*100+'%';
  shape.style.top=Math.random()*100+'%';
  shape.style.animationDuration=(Math.random()*20+10)+'s';
  bgShapes.appendChild(shape);
}
</script>

</body>
</html>
